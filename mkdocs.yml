site_name: abax documentation
site_description: >-
  abax — a keyboard-first statistics, data-science, and RF/amateur-radio
  workstation built on a fast, scriptable spreadsheet.
site_author: leavesofgrass
site_url: https://leavesofgrass.github.io/abax/
repo_url: https://github.com/leavesofgrass/abax
repo_name: leavesofgrass/abax
edit_uri: edit/main/docs/
copyright: Copyright &copy; abax contributors — GPL-3.0-or-later

docs_dir: docs
# Private working notes live under docs/roadmaps/ (gitignored) — never publish them.
exclude_docs: |
  roadmaps/

theme:
  name: material
  palette:
    # Light / dark toggle.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # GitHub-compatible heading slugs (e.g. "Statistics / analysis" ->
      # "statistics--analysis"), so intra-doc anchors written for GitHub's
      # rendering also resolve on the published site.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guides:
      - GUI guide: gui-guide.md
      - CLI: cli.md
      - Configuration: configuration.md
      - Macros & scripting: macros-and-scripting.md
      - Python console: python-console.md
      - Terminal: terminal.md
      - Automation API: automation.md
      - Jupyter: jupyter.md
  - Data & analysis:
      - Data science overview: data-science.md
      - Data & analysis tools: data-analysis.md
      - Conditional formatting: conditional-formatting.md
      - Formula reference: formula-reference.md
      - Calculators: calculators.md
  - Domains:
      - RF toolkit: rf-toolkit.md
      - Budgeting: budgeting.md
  - Files & formats:
      - File formats: file-formats.md
      - File manager: file-manager.md
  - Reference:
      - Architecture: architecture.md
      - Licensing: licensing.md

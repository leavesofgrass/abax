name: Release

# Pushing a tag that starts with `v` (e.g. v0.1.0) builds the artifacts and
# publishes a GitHub Release with them attached. A manual run (workflow_dispatch)
# builds and uploads the artifacts for testing but does NOT publish a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# The release job needs write access to create the Release and upload assets.
permissions:
  contents: write

env:
  PYTHONUTF8: "1"

jobs:
  # ── Wheel + sdist ──────────────────────────────────────────────────────────
  # abax is pure Python, so the wheel is `py3-none-any` and one build serves
  # every platform. This is the artifact to `pip install` when testing a release,
  # and it pre-stages a future PyPI publish. `twine check` guards long-description
  # rendering ahead of that.
  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*

  # ── abax.pyz (single-file zipapp) ──────────────────────────────────────────
  # make_pyz.py ships only optimize=2 .pyc (no source), so the archive is tied to
  # the Python minor version that builds it — pinned to 3.13 here. Users run it
  # with `python abax.pyz` on Python 3.13.
  pyz:
    name: Build abax.pyz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build abax.pyz
        run: python make_pyz.py
      - name: Smoke-test the archive
        run: python abax.pyz --version
      - uses: actions/upload-artifact@v7
        with:
          name: pyz
          path: abax.pyz

  # ── AppImage (Linux, portable, abax[all]) ──────────────────────────────────
  # Builds a single-file Linux binary of abax[all] via the Docker recipe under
  # packaging/appimage (manylinux_2_28 → glibc 2.28, so it runs on distros from
  # ~2019 on). Installs abax from the wheel job's artifact (extras from PyPI), so
  # it doesn't wait on the PyPI publish. Uploaded as an artifact that the release
  # job then attaches. Runs on tag pushes and manual runs (like wheel/pyz).
  appimage:
    name: Build AppImage (Linux, abax[all])
    needs: [wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch the built abax wheel (installed into the AppImage)
        uses: actions/download-artifact@v7
        with:
          name: wheel
          path: packaging/appimage/wheelhouse
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi
      - name: Build the AppImage in manylinux_2_28
        run: |
          docker build -t abax-appimage \
            --build-arg ABAX_VERSION="${{ steps.ver.outputs.version }}" \
            -f packaging/appimage/Dockerfile packaging/appimage
      - name: Extract the AppImage from the image
        run: |
          mkdir -p dist
          cid=$(docker create abax-appimage)
          docker cp "$cid:/build/dist" ./appimage-out
          docker rm "$cid"
          cp ./appimage-out/*.AppImage dist/
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: dist/*.AppImage

  # ── Windows binary (self-contained, PyInstaller) ───────────────────────────
  # Builds the three-exe bundle (abax.exe / abaxw.exe / abax-worker.exe sharing
  # one _internal/) natively on Windows — PyInstaller can't cross-compile. Ships
  # the same optional stack as the AppImage EXCEPT PyNEC, which has no Windows
  # wheel (the built-in Method-of-Moments antenna solver still works); so we
  # install the components of the `all` extra minus `nec` rather than `[all]`,
  # which would fail to resolve PyNEC on a clean runner. Zipped and uploaded for
  # the release job to attach. See packaging/windows/README.md.
  windows-binary:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi
      - name: Install abax + full stack (minus PyNEC) + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,thin,parquet,science,jupyter,bayes,stats-io,database,hdf5,satellite,tts,restricted]" pyinstaller pyttsx3 RestrictedPython "psycopg[binary]" PyMySQL
      - name: Build the bundle
        run: python -m PyInstaller packaging/windows/abax.spec --noconfirm --distpath dist/windows
      - name: Smoke-test the frozen build
        run: dist/windows/abax/abax.exe --version
      - name: Zip the bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path dist/windows/abax/* -DestinationPath "dist/abax-${{ steps.ver.outputs.version }}-windows-x64.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-binary
          path: dist/*.zip

  # ── macOS app bundle — arm64 (Apple Silicon), PyInstaller → .app → .dmg ─────
  # Built natively on macos-15 (PyInstaller can't cross-compile). The FULL `[all]`
  # stack (incl. PyNEC + pymc) resolves from prebuilt arm64 wheels, so no trimming
  # is needed. arm64 only — the vast majority of Macs are Apple Silicon now, and
  # Intel users have `pip install abax` or the portable abax.pyz. (A best-effort
  # Intel leg was tried in v0.1.11 but GitHub-hosted macos-13 runners starved in
  # the queue and blocked the release; not worth it — see packaging/macos/README.md.)
  # Calls packaging/macos/sign_and_notarize.sh, which codesigns + notarizes ONLY
  # when the Apple Developer secrets are set and is a no-op otherwise (unsigned).
  macos-binary:
    name: Build macOS app (arm64)
    runs-on: macos-15
    # Signing/notarization secrets, surfaced as env so the shared script (and its
    # skip-when-empty guard) can see them. Absent secrets → unsigned build.
    env:
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi
      - name: Install abax + full stack + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]" pyinstaller
      - name: Generate the .icns icon from the SVG
        run: bash packaging/macos/make_icns.sh
      - name: Build the app bundle
        run: python -m PyInstaller packaging/macos/abax.spec --noconfirm --distpath dist/macos
      - name: Smoke-test the frozen build
        run: dist/macos/Abax.app/Contents/MacOS/abax --version
      - name: Codesign the app (no-op without signing secrets)
        run: bash packaging/macos/sign_and_notarize.sh sign dist/macos/Abax.app
      - name: Package as a .dmg
        run: |
          set -e
          brew install create-dmg
          DMG="dist/abax-${{ steps.ver.outputs.version }}-macos-arm64.dmg"
          create-dmg --volname "abax ${{ steps.ver.outputs.version }}" \
            --app-drop-link 480 0 --icon "Abax.app" 120 0 \
            "$DMG" "dist/macos/Abax.app" \
            || hdiutil create -volname "abax" -srcfolder "dist/macos/Abax.app" -ov -format UDZO "$DMG"
      - name: Notarize + staple the .dmg (no-op without notary secrets)
        run: bash packaging/macos/sign_and_notarize.sh notarize "$(ls dist/*.dmg)"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-binary-arm64
          path: dist/*.dmg

  # ── Publish the GitHub Release ──────────────────────────────────────────────
  # Tag pushes only. Collects every built artifact and attaches them to a release
  # with auto-generated notes. Windows + macOS-arm64 are SOFT dependencies: they
  # stay in `needs` so the release waits for them (attaching their assets when
  # built), but the `if` below only *requires* the core artifacts (wheel/pyz/
  # AppImage) — a failed or unavailable platform build never blocks the release;
  # its asset is simply absent. `download-artifact` (no name) pulls whatever
  # artifacts exist at release time.
  release:
    name: Publish GitHub Release
    needs: [wheel, pyz, appimage, windows-binary, macos-binary]
    if: >-
      startsWith(github.ref, 'refs/tags/v') && !cancelled()
      && needs.wheel.result == 'success'
      && needs.pyz.result == 'success'
      && needs.appimage.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: List collected artifacts
        run: ls -R artifacts
      - name: Create / update the release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Publish to PyPI (Trusted Publishing / OIDC — no API token) ──────────────
  # Tag pushes only. Uploads the wheel + sdist to PyPI via a Trusted Publisher.
  # The matching PyPI publisher must be configured as:
  #   Owner: leavesofgrass · Repository: abax · Workflow: release.yml
  #   Environment: pypi   (must equal the `environment.name` below, or leave both blank)
  pypi:
    name: Publish to PyPI
    needs: [wheel]
    # **Tag pushes only.** Publishing is irreversible, so we deliberately do NOT
    # publish on `workflow_dispatch`: a manual run is for *testing* the build
    # (artifacts only), and firing PyPI from it would publish whatever version
    # is in pyproject.toml before it has actually been tagged/released. To
    # publish, push a `v*` tag.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/abax
    permissions:
      id-token: write        # required for OIDC / Trusted Publishing
    steps:
      - name: Download wheel + sdist
        uses: actions/download-artifact@v7
        with:
          name: wheel
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: don't fail if this version is already on PyPI (a re-cut
          # tag, or a workflow_dispatch test run against an already-published
          # version). New versions still publish normally.
          skip-existing: true

name: Docs

# Build the MkDocs-Material site from docs/ and publish it to GitHub Pages.
# Runs on pushes to main that touch the docs, and on manual dispatch. Requires
# the repo's Pages source to be set to "GitHub Actions" (Settings → Pages).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token for Pages deployment (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build the site (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install MkDocs Material
        run: python -m pip install mkdocs-material
      - name: Build (strict — fail on broken nav/links)
        run: mkdocs build --strict
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
